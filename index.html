<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTOR - Data Reconciler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --bg-color: #050505;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        /* Background Blobs - ปรับให้นุ่มนวลขึ้น */
        .blob-container { position: absolute; width: 100vw; height: 100vh; filter: blur(100px); z-index: 0; }
        .blob { position: absolute; border-radius: 50%; opacity: 0.3; animation: move 15s infinite alternate; }
        .blob1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -10%; }
        .blob2 { width: 450px; height: 450px; background: #667eea; bottom: -10%; right: -10%; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 50px); } }

        /* Card - ปรับให้ดูเป็น Card แบบ Pinterest */
        .content {
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            max-width: 420px;
        }
        .logo-text { font-size: 48px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 14px; color: #64748b; margin: 10px 0 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Button */
        .btn {
            display: block; background: #fff; color: #000;
            padding: 18px 0; border-radius: 16px; text-decoration: none;
            font-weight: 700; transition: transform 0.2s; margin-bottom: 40px;
        }
        .btn:hover { transform: scale(1.02); background: #e2e8f0; }

        /* Features Section */
        .features {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; text-align: left;
        }
        .feat-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .feat-desc { font-size: 12px; color: #94a3b8; line-height: 1.5; }
        
        .version { margin-top: 30px; font-size: 11px; color: #475569; }
    </style>
</head>
<body>

    <div class="blob-container">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="content">
        <h1 class="logo-text">EXTOR</h1>
        <div class="subtitle">Intelligent Data Reconciler</div>
        
        <a href="https://github.com/Buanruk/EXTOR/releases/download/v1.0.1/EXTOR_Setup_v1.0.1.exe" class="btn">
            Download Installer
        </a>
        
        <div class="features">
            <div>
                <div class="feat-title">High Accuracy</div>
                <div class="feat-desc">AI-powered logic ensures zero-error comparison.</div>
            </div>
            <div>
                <div class="feat-title">Lightning Fast</div>
                <div class="feat-desc">Process millions of data rows in mere seconds.</div>
            </div>
        </div>
        
        <div class="version">Stable Version 1.0.1 • Windows x64</div>
    </div>

</body>
</html>
