<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTOR - Data Reconciler</title>
    <!-- นำเข้าฟอนต์สไตล์ล้ำยุค -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-color: #050505;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* --- อนิเมชันแสงเบลอขยับไปมาด้านหลัง (Glowing Blobs) --- */
        .blob-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            filter: blur(80px);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }
        .blob1 {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -10%; left: -10%;
            animation-duration: 12s;
        }
        .blob2 {
            width: 500px; height: 500px;
            background: #667eea;
            bottom: -20%; right: -10%;
            animation-duration: 15s;
            animation-delay: 2s;
        }
        .blob3 {
            width: 350px; height: 350px;
            background: #764ba2;
            top: 40%; left: 30%;
            animation-duration: 18s;
        }
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 100px) scale(1.2); }
        }

        /* --- ลายเส้นตารางแบบ Tech Grid --- */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* --- กล่องข้อความโปร่งแสง (Glassmorphism) --- */
        .content {
            position: relative;
            z-index: 2;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: floatUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes floatUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ชื่อแบรนด์แบบมีแสงวิ่ง --- */
        .logo-text {
            font-size: 65px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: 4px;
            background: linear-gradient(to right, #00f2fe, #4facfe, #00f2fe, #4facfe);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        .subtitle {
            font-size: 14px;
            color: #a0aec0;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .desc {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* --- ปุ่มกดแบบมีเอฟเฟกต์แสงสแกน --- */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 45px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            text-decoration: none;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            transform: translateY(-3px);
        }
        .btn:hover::before {
            left: 100%;
        }

        .version {
            margin-top: 25px;
            font-size: 12px;
            color: #718096;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- ก้อนแสงพื้นหลังขยับได้ -->
    <div class="blob-container">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <!-- ลายเส้นตาราง -->
    <div class="grid-overlay"></div>

    <!-- กล่องหลัก -->
    <div class="content">
        <h1 class="logo-text">EXTOR</h1>
        <div class="subtitle">Data Reconciler PRO</div>
        <div class="desc">
            Intelligent Data Comparison System<br>
            ระบบเปรียบเทียบข้อมูลอัตโนมัติความแม่นยำสูง
        </div>
        
        <!-- 📌 อย่าลืมเอาลิงก์ดาวน์โหลดจริงของหนุ่มมาใส่แทนเครื่องหมาย # ตรงนี้ด้วยนะครับ -->
        <a href="https://github.com/Buanruk/EXTOR/releases/download/v1.0.0/EXTOR_Setup_v1.exe" class="btn">
            <span>DOWNLOAD INSTALLER</span>
        </a>
        
        <div class="version">Stable Version 1.0.0</div>
    </div>

</body>
</html>
